<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>
  <link rel="icon" type="image/png" href="{{ '/icon.png' | relative_url }}">
  <style>
    /* Comic Mono font */
    @font-face {
      font-family: 'Comic Mono';
      font-style: normal;
      font-weight: 400;
      src: url('https://cdn.jsdelivr.net/gh/dtinth/comic-mono-font@master/ComicMono.ttf') format('truetype');
    }
    @font-face {
      font-family: 'Comic Mono';
      font-style: normal;
      font-weight: 700;
      src: url('https://cdn.jsdelivr.net/gh/dtinth/comic-mono-font@master/ComicMono-Bold.ttf') format('truetype');
    }

    /* Gruvbox Material Theme (Light/Dark Switchable) */
    :root {
      /* Default to Light Soft Theme */
      --bg-dim: #ebdbb2;
      --bg0: #f2e5bc;
      --bg1: #eddeb5;
      --bg2: #ebdbb2;
      --bg3: #e6d5ae;
      --bg4: #dac9a5;
      --bg5: #d5c4a1;

      --fg0: #654735;
      --fg1: #4f3829;

      --red: #c14a4a;
      --orange: #c35e0a;
      --yellow: #b47109;
      --green: #6c782e;
      --aqua: #4c7a5d;
      --blue: #45707a;
      --purple: #945e80;

      --grey0: #a89984;
      --grey1: #928374;
      --grey2: #7c6f64;
    }

    [data-theme="dark"] {
      /* Dark Medium Theme Overrides */
      --bg-dim: #1b1b1b;
      --bg0: #282828;
      --bg1: #32302f;
      --bg2: #32302f;
      --bg3: #45403d;
      --bg4: #45403d;
      --bg5: #5a524c;

      --fg0: #d4be98;
      --fg1: #ddc7a1;

      --red: #ea6962;
      --orange: #e78a4e;
      --yellow: #d8a657;
      --green: #a9b665;
      --aqua: #89b482;
      --blue: #7daea3;
      --purple: #d3869b;

      --grey0: #7c6f64;
      --grey1: #928374;
      --grey2: #a89984;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg0);
      color: var(--fg0);
      font-family: 'Comic Mono', monospace;
      font-size: 15px;
      line-height: 1.5;
      margin: 0 auto;
      padding: 40px 20px;
      max-width: 900px;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* Headers */
    h1, h2, h3, h4, h5, h6 {
      color: var(--fg1);
      margin-top: 1em;
      margin-bottom: 0.5em;
      transition: color 0.3s ease;
    }

    h1 { color: var(--yellow); }
    h2 { color: var(--orange); font-size: 1.4em; }
    h3 { color: var(--aqua); font-size: 1.55em; }

    /* Links */
    a {
      color: var(--blue);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    a:hover {
      color: var(--aqua);
      text-decoration: underline;
    }

    a:visited {
      color: var(--purple);
    }

    /* Horizontal rules */
    hr {
      border: none;
      border-top: 1px solid var(--bg3);
      margin: 1.5em 0;
      transition: border-color 0.3s ease;
    }

    /* Paragraphs */
    p {
      margin: 0.5em 0;
    }

    /* Strong/Bold text */
    strong {
      color: var(--fg1);
      font-weight: 600;
      transition: color 0.3s ease;
    }

    /* Italic text */
    em, i {
      color: var(--grey2);
      font-style: italic;
      transition: color 0.3s ease;
    }

    /* Subtext class */
    .subtext {
      color: var(--grey2);
      transition: color 0.3s ease;
    }

    /* Section titles (org / role / project names) */
    .row > strong {
      color: var(--aqua);
    }

    /* Right-aligned dates, years, and values — always pinned right, never wrapped */
    .row > *:last-child:not(:only-child) {
      color: var(--yellow);
      flex-shrink: 0;
      white-space: nowrap;
      text-align: right;
    }

    /* Layout helpers */
    .row {
      display: flex;
      justify-content: space-between;
      flex-wrap: nowrap;
      column-gap: 1em;
      align-items: baseline;
    }

    /* Let long titles wrap within their column instead of pushing the date to a new line */
    .row > *:first-child {
      min-width: 0;
    }

    .indent {
      padding-left: 20px;
    }

    /* Accomplishment bullets — space only BETWEEN consecutive bullets, so a
       lone bullet (e.g. a grade) doesn't push neighboring course rows out of rhythm */
    .row.indent + .row.indent {
      margin-top: 0.25em;
    }

    .row.indent > span:first-child::before,
    .indent > .row > span:first-child::before {
      content: "-";
      margin-right: 0.5em;
      color: var(--green);
    }

    .center {
      text-align: center;
    }

    /* Selection */
    ::selection {
      background-color: var(--bg3);
      color: var(--fg1);
    }

    /* Code-like elements (for the :wq<CR> at bottom) */
    code {
      background-color: var(--bg1);
      color: var(--green);
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Comic Mono', monospace;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* Smooth scrolling */
    html {
      scroll-behavior: smooth;
    }

    /* Theme toggle button */
    #theme-toggle {
      position: fixed;
      top: 12px;
      right: 12px;
      background-color: var(--bg2);
      color: var(--fg0);
      border: 1px solid var(--bg5);
      border-radius: 6px;
      padding: 4px 9px;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    #theme-toggle:hover {
      background-color: var(--bg4);
    }

    /* Download-PDF button (bottom of page) */
    #download-pdf {
      display: inline-block;
      margin-top: 1em;
      background-color: var(--bg2);
      color: var(--fg0);
      border: 1px solid var(--bg5);
      border-radius: 6px;
      padding: 6px 14px;
      font-family: 'Comic Mono', monospace;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    #download-pdf:hover {
      background-color: var(--bg4);
    }

    /* Off-screen measurement metrics — applied momentarily by the download
       script to measure content height. MUST match the @media print body below
       exactly, so the computed page height fits the resume on a single page. */
    html.pdf-measure body {
      width: 816px;
      max-width: 816px;
      margin: 0;
      padding: 1.5cm;
      font-size: 13px;
    }
    /* match print: drop the screen-only buttons and the leading/trailing
       child margins so measured height equals the printed height */
    html.pdf-measure #download-pdf,
    html.pdf-measure #theme-toggle {
      display: none;
    }
    html.pdf-measure #theme-toggle + *,
    html.pdf-measure #theme-toggle + * > *:first-child {
      margin-top: 0;
    }

    /* Print */
    @media print {
      /* Single continuous page: the download script sets @page size to the exact
         content height so there are no page breaks. The background fills the whole
         sheet edge-to-edge (@page margin 0) and body padding insets the text — so
         every side gets an even 1.5cm colored margin. */
      @page {
        margin: 0;
      }

      body {
        width: 816px;
        max-width: 816px;
        margin: 0;
        padding: 1.5cm;
        font-size: 13px;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      /* even 1.5cm on top: strip the leading heading margin so the body padding
         is the only inset (matches html.pdf-measure above) */
      #theme-toggle + *,
      #theme-toggle + * > *:first-child {
        margin-top: 0;
      }

      #theme-toggle,
      #download-pdf {
        display: none;
      }

      * {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      *, body, h1, h2, h3, h4, h5, h6, a, hr, strong, em, i, .subtext, code {
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <button id="theme-toggle" aria-label="Toggle light/dark theme" title="Toggle theme (t)">◐</button>
  {{ content }}
  <script>
    (function() {
      // --- Download as a single-page PDF ---
      // Measure the content at the print metrics, then size @page to fit exactly,
      // so the PDF is one continuous page with even 1.5cm margins on all sides.
      const dlBtn = document.getElementById('download-pdf');
      if (dlBtn) {
        dlBtn.addEventListener('click', function() {
          const W = 816; // 8.5in @ 96dpi — fixed PDF width
          const root = document.documentElement;
          root.classList.add('pdf-measure');
          const h = Math.ceil(document.body.getBoundingClientRect().height);
          root.classList.remove('pdf-measure');
          let st = document.getElementById('pdf-page-rule');
          if (!st) {
            st = document.createElement('style');
            st.id = 'pdf-page-rule';
            document.head.appendChild(st);
          }
          st.textContent = '@page { size: ' + W + 'px ' + h + 'px; margin: 0; }';
          window.print();
        });
      }

      // --- Vim Motions ---
      let lastKey = '';
      let lastKeyTime = 0;

      window.addEventListener('keydown', function(e) {
        if (e.metaKey || e.ctrlKey || e.altKey || ['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) {
          return;
        }

        const scrollAmount = 100;
        const now = Date.now();

        if (e.key === 'j') {
          window.scrollBy(0, scrollAmount);
        } else if (e.key === 'k') {
          window.scrollBy(0, -scrollAmount);
        } else if (e.key === 'g') {
          if (lastKey === 'g' && (now - lastKeyTime) < 500) {
            window.scrollTo(0, 0);
            lastKey = '';
          } else {
            lastKey = 'g';
            lastKeyTime = now;
          }
        } else if (e.key === 'G') {
          window.scrollTo(0, document.body.scrollHeight);
          lastKey = '';
        } else if (e.key === 't') {
          toggleTheme();
          lastKey = '';
        } else {
          lastKey = '';
        }
      });

      // --- Theme Switcher (2-finger swipe) ---
      const html = document.documentElement;
      
      // Load saved theme, falling back to the OS preference
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme) {
        html.setAttribute('data-theme', savedTheme);
      } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        html.setAttribute('data-theme', 'dark');
      }

      document.getElementById('theme-toggle').addEventListener('click', toggleTheme);

      function toggleTheme() {
        const current = html.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      }

      let isSwiping = false;
      let swipeTimeout;

      window.addEventListener('wheel', function(e) {
        // Detect horizontal swipe (like macOS desktop switch)
        // Adjust threshold as needed. 30 is a reasonable start for trackpads.
        if (Math.abs(e.deltaX) > 30 && Math.abs(e.deltaY) < 10) {
          if (!isSwiping) {
            isSwiping = true;
            toggleTheme();
            
            // Prevent multiple switches in a single gesture
            clearTimeout(swipeTimeout);
            swipeTimeout = setTimeout(() => {
              isSwiping = false;
            }, 1000); // 1 second cooldown
          }
        }
      }, { passive: true });
    })();
  </script>
</body>
</html>
